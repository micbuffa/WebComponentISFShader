<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISF Modular Demo</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 480px 1fr;
        gap: 16px;
        padding: 16px;
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
      }
      .controls {
        display: grid;
        gap: 16px;
        align-content: start;
      }
      canvas {
        width: 100%;
        height: calc(100vh - 32px);
        display: block;
        border-radius: 12px;
        background: black;
      }
      @media (max-width: 980px) {
        body { grid-template-columns: 1fr; }
        canvas { height: 60vh; }
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <isf-shader-renderer
        id="rendererA"
        presets='[
          {"url":"./shaders/Chain_Source.fs"},
          {"url":"./shaders/Damier_Dynamique.fs"},
          {"url":"./shaders/Organic_Rainbow_Flow.fs"}
        ]'
      ></isf-shader-renderer>

      <isf-shader-renderer
        id="rendererB"
        presets='[
          {"url":"./shaders/Chain_WaveDistort.fs"},
          {"url":"./shaders/Liquid_Aurora.fs"},
          {"url":"./shaders/Nebula_Feedback.fs"}
        ]'
      ></isf-shader-renderer>

      <isf-shader-renderer
        id="rendererC"
        presets='[
          {"url":"./shaders/Chain_VignetteTint.fs"},
          {"url":"./shaders/Nebula_Feedback.fs"},
          {"url":"./shaders/Liquid_Aurora.fs"}
        ]'
      ></isf-shader-renderer>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script type="module">
      import './src/isf-web-component.js';

      const rendererA = document.getElementById('rendererA');
      const rendererB = document.getElementById('rendererB');
      const rendererC = document.getElementById('rendererC');
      const canvas = document.getElementById('renderCanvas');

      rendererA.connect(rendererB);
      rendererB.connect(rendererC);
      rendererC.connect(canvas);
    </script>
  </body>
</html>
